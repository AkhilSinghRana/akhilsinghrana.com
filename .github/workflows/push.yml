name: Build, scan, and deploy on push to main

concurrency:
    group: production
    cancel-in-progress: false

on:
    push:
        branches:
            - main

jobs:
    # ── Job 1: Build and deploy backend ──────────────────────────────────────
    deploy-backend:
        name: Deploy backend to Cloud Run
        runs-on: ubuntu-latest
        environment: gcloud

        permissions:
            contents: read
            id-token: write

        outputs:
            backend-url: ${{ steps.get-url.outputs.url }}

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Authenticate to Google Cloud
              id: auth
              uses: google-github-actions/auth@v2
              with:
                  project_id: ${{ vars.PROJECT_NAME }}
                  workload_identity_provider: ${{ secrets.WID }}
                  service_account: ${{ secrets.SERVICE_ACCOUNT }}

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Regenerate site-content.json for RAG
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
            - run: node akhilsinghrana/frontend/scripts/export-content.mjs

            - name: Authenticate Docker to Artifact Registry
              run: gcloud auth configure-docker ${{ vars.SERVICE_LOCATION }}-docker.pkg.dev

            - name: Build Docker image
              run: |
                  docker build -t "${{ vars.ARTIFACT_LOCATION }}:${{ github.sha }}" .
              env:
                  DOCKER_BUILDKIT: 1

            - name: Scan image for critical vulnerabilities
              uses: aquasecurity/trivy-action@master
              with:
                  image-ref: "${{ vars.ARTIFACT_LOCATION }}:${{ github.sha }}"
                  format: "table"
                  exit-code: "0" # warn only — set to "1" to fail on CRITICAL
                  severity: "CRITICAL,HIGH"

            - name: Push image to Artifact Registry
              run: docker push "${{ vars.ARTIFACT_LOCATION }}:${{ github.sha }}"

            - name: Deploy to Cloud Run
              run: |
                  gcloud run deploy ${{ vars.SERVICE_NAME }} \
                    --image "${{ vars.ARTIFACT_LOCATION }}:${{ github.sha }}" \
                    --platform managed \
                    --region ${{ vars.SERVICE_LOCATION }} \
                    --allow-unauthenticated \
                    --max-instances 2 \
                    --memory 512Mi \
                    --cpu 1 \
                    --set-env-vars "^|^SMTP_SERVER=${{ vars.SMTP_SERVER }}|SMTP_PORT=${{ vars.SMTP_PORT }}|SMTP_USERNAME=${{ vars.SMTP_USERNAME }}|RECIPIENT_EMAIL=${{ vars.SMTP_RECIPIENT_EMAIL }}|CORS_ORIGINS=${{ vars.CORS_ORIGINS }}" \
                    --set-secrets "SMTP_PASSWORD=smtp-password:latest,GROQ_API_KEY=groq-api-key:latest,TOGETHER_API_KEY=together-api-key:latest,TAVILY_API_KEY=tavily-api-key:latest,HF_API_KEY=hf-api-key:latest"

            - name: Get deployed backend URL
              id: get-url
              run: |
                  URL=$(gcloud run services describe ${{ vars.SERVICE_NAME }} \
                    --region ${{ vars.SERVICE_LOCATION }} \
                    --format="value(status.url)")
                  echo "url=$URL" >> $GITHUB_OUTPUT

            - name: Clean up old Artifact Registry images (keep last 5)
              run: |
                  gcloud artifacts docker images list ${{ vars.ARTIFACT_LOCATION }} \
                    --include-tags \
                    --format="get(version)" \
                    --sort-by="~createTime" \
                    | tail -n +6 \
                    | xargs -r -I {} gcloud artifacts docker images delete \
                        "${{ vars.ARTIFACT_LOCATION }}@{}" --quiet --delete-tags || true

    # ── Job 2: Build and deploy frontend ─────────────────────────────────────
    deploy-frontend:
        name: Deploy frontend to Firebase Hosting
        runs-on: ubuntu-latest
        needs: deploy-backend # ensures backend URL is available

        permissions:
            contents: read
            id-token: write

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Authenticate to Google Cloud
              uses: google-github-actions/auth@v2
              with:
                  project_id: ${{ vars.PROJECT_NAME }}
                  workload_identity_provider: ${{ secrets.WID }}
                  service_account: ${{ secrets.SERVICE_ACCOUNT }}

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: akhilsinghrana/frontend/package-lock.json

            - name: Install dependencies
              run: npm ci
              working-directory: akhilsinghrana/frontend

            - name: Build frontend (static export)
              run: npm run build
              working-directory: akhilsinghrana/frontend
              env:
                  NEXT_PUBLIC_API_URL: ${{ needs.deploy-backend.outputs.backend-url }}

            - name: Deploy to Firebase Hosting
              run: |
                  npx firebase-tools@latest deploy --only hosting \
                    --project ${{ vars.PROJECT_NAME }} \
                    --non-interactive
              working-directory: akhilsinghrana/frontend
